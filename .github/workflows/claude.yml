name: Claude Code

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened]

jobs:
  claude:
    uses: synadia-io/ai-workflows/.github/workflows/claude.yml@v1
    with:
      review_focus: |
        Additionally focus on:
        - Helm chart correctness (valid templates, proper value defaults, upgrade safety)
        - Kubernetes manifest best practices (resource limits, security contexts, labels)
        - Docker image security (minimal base images, no secrets in layers)
        - YAML syntax and indentation correctness
    secrets:
      claude_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
